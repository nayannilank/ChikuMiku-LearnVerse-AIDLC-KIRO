name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  NODE_VERSION: '22'

jobs:
  deploy-backend:
    name: Deploy Backend (AWS CDK)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::165030184891:role/cdk-hnb659fds-deploy-role-165030184891-ap-south-1
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK Deploy
        working-directory: infra
        run: npx cdk deploy --all --require-approval never --outputs-file cdk-outputs.json

      - name: Upload CDK outputs
        uses: actions/upload-artifact@v4
        with:
          name: cdk-outputs
          path: infra/cdk-outputs.json
          retention-days: 30
